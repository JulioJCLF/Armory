<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Caliber</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="mobile-header">
    <button class="hamburger" id="nav-toggle" aria-label="Abrir menu">
      <span></span><span></span><span></span>
    </button>
    <div class="mobile-logo">CALIBER</div>
    <div style="width:40px"></div>
  </header>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <span class="logo-name">CALIBER</span>
      <span class="logo-sub">Airsoft Management</span>
    </div>
    <nav>
      <a data-view="dashboard" class="active">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Painel</span>
      </a>
      <a data-view="clientes">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Clientes</span>
      </a>
      <a data-view="equipamentos">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        <span>Equipamentos</span>
      </a>
      <a data-view="estoque">
        <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span>Estoque de Peças</span>
      </a>
      <a data-view="ordens">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        <span>Ordens de Serviço</span>
      </a>
      <a data-view="remarketing">
        <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        <span>Remarketing</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <span>Caliber v1.0</span>
    </div>
  </aside>

  <main>
    <div id="view"></div>
  </main>

  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title"></h3>
        <button class="close" onclick="fecharModal()" aria-label="Fechar">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
